name: Hello World Training Workflow

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]

jobs:
  greet:
      env: 
          VAR1: "Charminar"
          VAR2: "Summer heat"
      runs-on: ubuntu-latest
      steps:
      - name: Greet the User
        run: echo "Hello World!"  
      - uses: actions/checkout@v4
      - name: Run script
        run: |
          echo "Hello $VAR1"
          echo "How is the $VAR2"
